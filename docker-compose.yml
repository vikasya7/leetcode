version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: leetcode_build
    restart: unless-stopped

    environment:
      POSTGRES_DB: leetcode
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123

    ports:
      - "5433:5432"

    volumes:
      - leetcode_db_data:/var/lib/postgresql/data

volumes:
  leetcode_db_data: